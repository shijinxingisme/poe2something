<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POE2 国服通货兑换建议器</title>
    <meta name="description" content="输入 POE2 国服通货比例，比较崇高石和混沌石兑换神圣石的成本。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">POE2 Currency Advisor</p>
          <h1 id="page-title">国服通货兑换建议器</h1>
          <p class="lede">输入当前市场比例，快速判断兑换神圣石时用崇高石更划算，还是直接用混沌石更划算。</p>
        </div>
        <div class="market-strip" aria-label="计算关注点">
          <span>神圣石</span>
          <span>崇高石</span>
          <span>混沌石</span>
        </div>
      </section>

      <section class="workspace" aria-label="兑换计算器">
        <form class="panel input-panel" id="advisor-form">
          <div class="panel-heading">
            <p class="eyebrow">输入比例</p>
            <h2>今天的市场价</h2>
          </div>

          <label class="field">
            <span>需要兑换的神圣石数量</span>
            <input id="target-divines" type="number" min="0.01" step="0.01" value="1" inputmode="decimal" />
          </label>

          <label class="field">
            <span>1 神圣石 = 多少混沌石</span>
            <input id="divine-chaos" type="number" min="0.01" step="0.01" value="110" inputmode="decimal" />
          </label>

          <label class="field">
            <span>1 神圣石 = 多少崇高石</span>
            <input id="divine-exalt" type="number" min="0.01" step="0.01" value="5" inputmode="decimal" />
          </label>

          <label class="field">
            <span>1 崇高石 = 多少混沌石</span>
            <input id="exalt-chaos" type="number" min="0.01" step="0.01" value="20" inputmode="decimal" />
          </label>

          <details class="advanced">
            <summary>加入我手上的通货</summary>
            <label class="field">
              <span>已有混沌石</span>
              <input id="owned-chaos" type="number" min="0" step="1" value="0" inputmode="decimal" />
            </label>
            <label class="field">
              <span>已有崇高石</span>
              <input id="owned-exalt" type="number" min="0" step="1" value="0" inputmode="decimal" />
            </label>
          </details>
        </form>

        <section class="panel result-panel" aria-live="polite">
          <div class="result-topline">
            <p class="eyebrow">推荐方案</p>
            <span class="confidence" id="confidence-label">计算中</span>
          </div>
          <h2 id="recommendation">等待输入</h2>
          <p class="reason" id="reason">请填写通货比例。</p>

          <div class="cost-board">
            <article>
              <span>混沌石路线</span>
              <strong id="chaos-cost">-</strong>
              <small>折算混沌石成本</small>
            </article>
            <article>
              <span>崇高石路线</span>
              <strong id="exalt-cost">-</strong>
              <small>折算混沌石成本</small>
            </article>
            <article>
              <span>预计节省</span>
              <strong id="saving">-</strong>
              <small>越高越值得换路线</small>
            </article>
          </div>

          <div class="steps" id="steps"></div>
          <div class="break-even" id="break-even"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
