<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POE2 市场套利分析器</title>
    <meta name="description" content="基于 POE2 通货价格和实际报价，扫描 A→B→C→A 路径套利机会并排序。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">POE2 Market Arbitrage</p>
          <h1 id="page-title">通货三角套利雷达</h1>
          <p class="lede">输入行情价格和实际交易报价，扫描 A→B→C→A 闭环路径，找出收益率最高的 Top N 套利机会。</p>
        </div>
        <div class="hero-metrics" aria-label="当前扫描摘要">
          <article><span>可用报价</span><strong id="quote-count">0</strong></article>
          <article><span>套利机会</span><strong id="deal-count">0</strong></article>
          <article><span>最高收益</span><strong id="best-gain">0%</strong></article>
        </div>
      </section>

      <section class="control-grid" aria-label="套利参数">
        <div class="panel settings-panel">
          <div class="panel-title">
            <p class="eyebrow">扫描设置</p>
            <h2>从哪种通货开始</h2>
          </div>
          <div class="form-grid">
            <label class="field">
              <span>起点通货 A</span>
              <select id="start-currency"></select>
            </label>
            <label class="field">
              <span>投入数量</span>
              <input id="start-amount" type="number" min="0.01" step="0.01" value="100" inputmode="decimal" />
            </label>
            <label class="field">
              <span>展示 Top N</span>
              <input id="top-n" type="number" min="1" max="20" step="1" value="6" inputmode="numeric" />
            </label>
            <label class="field">
              <span>最低收益率</span>
              <input id="min-profit" type="number" min="0" step="0.1" value="0.5" inputmode="decimal" />
            </label>
          </div>
        </div>

        <div class="panel import-panel">
          <div class="panel-title compact-title">
            <div>
              <p class="eyebrow">行情来源</p>
              <h2>poe2db 价格表</h2>
            </div>
            <a class="source-link" href="https://poe2db.tw/cn/Economy" target="_blank" rel="noreferrer">打开 poe2db</a>
          </div>
          <p class="hint">MVP 支持把 poe2db Economy 页面中复制到的通货行粘贴进来；也可以直接编辑下方价格。</p>
          <textarea id="price-import" rows="5" placeholder="示例：神圣石 112&#10;崇高石 20&#10;混沌石 1"></textarea>
          <div class="button-row">
            <button id="import-prices" type="button">导入价格</button>
            <button id="reset-sample" type="button" class="ghost">恢复示例</button>
          </div>
        </div>
      </section>

      <section class="main-grid">
        <section class="panel data-panel" aria-label="价格和报价">
          <div class="tabs" role="tablist" aria-label="数据输入">
            <button class="tab active" type="button" data-tab="prices">通货价格</button>
            <button class="tab" type="button" data-tab="quotes">交易报价</button>
          </div>

          <div class="tab-page active" id="prices-page">
            <div class="table-head"><span>通货</span><span>折算混沌石</span></div>
            <div id="price-list" class="price-list"></div>
          </div>

          <div class="tab-page" id="quotes-page">
            <p class="hint">每行一个报价：A&gt;B=数量，意思是 1 个 A 可以换到多少 B。</p>
            <textarea id="quote-input" rows="14"></textarea>
            <div class="button-row"><button id="apply-quotes" type="button">应用报价</button></div>
          </div>
        </section>

        <section class="panel result-panel" aria-live="polite">
          <div class="result-head">
            <div>
              <p class="eyebrow">Top N Opportunities</p>
              <h2>套利路径排序</h2>
            </div>
            <span id="market-status" class="status-pill">示例行情</span>
          </div>
          <div id="opportunity-list" class="opportunity-list"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
